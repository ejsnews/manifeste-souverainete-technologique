<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manifeste pour la Souveraineté et la Résilience Technologique</title>
  
  <style>
    // 1. STYLE GLOBAL SOMBRE
    body {
      background-color: #0d1117;
      color: #f0f6fc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 20px;
      line-height: 1.8;
      margin: 0;
      padding: 0;
    }

    // 2. ZONE DE TEXTE PLEINE LARGEUR ET JUSTIFIÉE
    .main-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 50px 30px;
      box-sizing: border-box;
    }
    p, li {
      text-align: justify;
      color: #f0f6fc;
    }

    // 3. TITRES EN JAUNE D'OR
    h1, h2, h3, h4 {
      color: #f2cc60;
      font-weight: 700;
      text-align: left;
    }
    h1 { font-size: 2.3em; margin-bottom: 0.8em; }
    h2 { font-size: 1.7em; margin-top: 1.8em; border-bottom: 1px solid #30363d; padding-bottom: 0.4em; }
    h3 { font-size: 1.3em; margin-top: 1.5em; }

    // 4. CORRECTION ABSOLUE ET FORÇAGE DU TABLEAU TECHNIQUE
    table {
      display: table !important;
      width: 100% !important;
      border-collapse: collapse !important;
      margin: 35px 0 !important;
      font-size: 18px !important;
      background-color: #161b22 !important;
      border: 1px solid #30363d !important;
    }
    th, td {
      padding: 14px 16px !important;
      border: 1px solid #30363d !important;
      text-align: left !important;
    }
    th {
      background-color: #21262d !important;
      color: #f2cc60 !important;
      font-weight: bold;
    }
    tr:nth-child(even) {
      background-color: #1f242c; /* Alternance de couleur pour la lisibilité */
    }

    // 5. BLOC AVERTISSEMENT (Disclaimer)
    blockquote {
      padding: 20px;
      margin: 35px 0;
      background-color: #161b22;
      border-left: 4px solid #f2cc60;
      font-style: italic;
    }
    blockquote p {
      color: #8b949e !important;
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="main-content">
    {{ content }}
  </main>
</body>
</html>
