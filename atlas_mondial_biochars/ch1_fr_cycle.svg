<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
<linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#f8fbff"/>
<stop offset="100%" stop-color="#eef5ef"/>
</linearGradient>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
<path d="M0,0 L10,3 L0,6 Z" fill="#555"/>
</marker>
<style>
text{font-family:Arial,sans-serif}
.title{font-size:34px;font-weight:bold;fill:#222}
.h{font-size:22px;font-weight:bold}
.t{font-size:18px;fill:#333}
.small{font-size:14px;fill:#555}
.box{fill:white;stroke:#666;stroke-width:2}
</style>
</defs>
<rect width="1600" height="900" fill="url(#g1)"/>
<text x="800" y="55" text-anchor="middle" class="title">Chapitre 1 — Cycle de la thermolyse et valorisation du biochar</text>

<rect x="80" y="120" width="300" height="140" rx="12" class="box"/>
<text x="230" y="155" text-anchor="middle" class="h">Biomasse durable</text>
<text x="230" y="185" text-anchor="middle" class="t">• Bois</text>
<text x="230" y="210" text-anchor="middle" class="t">• Bambou</text>
<text x="230" y="235" text-anchor="middle" class="t">• Résidus ligneux</text>

<rect x="650" y="100" width="300" height="180" rx="12" fill="#fff8ef" stroke="#c96f00" stroke-width="3"/>
<text x="800" y="145" text-anchor="middle" class="h">Thermolyse</text>
<text x="800" y="175" text-anchor="middle" class="t">Atmosphère pauvre en oxygène</text>
<text x="800" y="205" text-anchor="middle" class="t">≈ 500–650 °C</text>
<text x="800" y="235" text-anchor="middle" class="t">Valorisation multifilière</text>

<line x1="380" y1="190" x2="650" y2="190" stroke="#555" stroke-width="4" marker-end="url(#arrow)"/>

<rect x="1150" y="80" width="330" height="170" rx="12" fill="#eef7ff" stroke="#1976d2" stroke-width="3"/>
<text x="1315" y="120" text-anchor="middle" class="h">Gaz renouvelables</text>
<text x="1315" y="150" text-anchor="middle" class="t">Hydrogène</text>
<text x="1315" y="175" text-anchor="middle" class="t">SNG • SAF • Syngaz</text>

<rect x="1150" y="330" width="330" height="350" rx="12" fill="#f5f5f5" stroke="#202124" stroke-width="3"/>
<text x="1315" y="370" text-anchor="middle" class="h">Biochar</text>
<text x="1315" y="410" text-anchor="middle" class="t">Construction bas carbone</text>
<text x="1315" y="445" text-anchor="middle" class="t">Agriculture</text>
<text x="1315" y="480" text-anchor="middle" class="t">Filtration</text>
<text x="1315" y="515" text-anchor="middle" class="t">Matériaux techniques</text>
<text x="1315" y="550" text-anchor="middle" class="t">Séquestration du CO₂</text>

<line x1="950" y1="170" x2="1150" y2="165" stroke="#1976d2" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="950" y1="220" x2="1150" y2="420" stroke="#202124" stroke-width="4" marker-end="url(#arrow)"/>

<rect x="120" y="420" width="760" height="300" rx="12" class="box"/>
<text x="500" y="460" text-anchor="middle" class="h">Principes clés</text>
<text x="150" y="505" class="t">• La biomasse riche en lignine produit généralement un biochar plus stable.</text>
<text x="150" y="540" class="t">• Le biochar peut être valorisé comme matériau et comme puits de carbone.</text>
<text x="150" y="575" class="t">• La qualité dépend du procédé, des intrants et des certifications.</text>
<text x="150" y="610" class="t">• Une approche multifilière améliore le modèle économique.</text>

<line x1="0" y1="840" x2="1600" y2="840" stroke="#bbb"/>
<text x="20" y="875" class="small">Atlas mondial de la valorisation économique du Biochar — ch1_fr_cycle.svg — Version 1.0</text>
</svg>
